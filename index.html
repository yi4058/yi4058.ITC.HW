<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>藍天風箏 · 修辭花園 · 合併題庫</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', '微軟正黑體', 'Helvetica', sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #7ec8ff 0%, #b5e4ff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
      position: relative;
      overflow-x: hidden;
      transition: filter 0.3s;
    }
    body.focus-mode .cloud,
    body.focus-mode .sun,
    body.focus-mode .kite:not(.centered) {
      filter: blur(4px);
      transition: filter 0.3s ease;
    }
    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 1000px;
      box-shadow: 0 15px 30px rgba(255,255,255,0.3);
      z-index: 0;
      filter: blur(2px);
    }
    .cloud1 { width: 180px; height: 70px; top: 10%; left: 5%; }
    .cloud1::before, .cloud1::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
      box-shadow: inherit;
    }
    .cloud1::before { width: 80px; height: 80px; top: -40px; left: 20px; }
    .cloud1::after { width: 100px; height: 100px; top: -50px; left: 70px; }
    .cloud2 { width: 220px; height: 80px; bottom: 15%; right: 8%; }
    .cloud2::before, .cloud2::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
      box-shadow: inherit;
    }
    .cloud2::before { width: 100px; height: 100px; top: -50px; left: 30px; }
    .cloud2::after { width: 120px; height: 120px; top: -60px; left: 100px; }
    .cloud3 { width: 150px; height: 60px; top: 40%; left: 20%; opacity: 0.7; }
    .cloud3::before, .cloud3::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
      box-shadow: inherit;
    }
    .cloud3::before { width: 70px; height: 70px; top: -35px; left: 20px; }
    .cloud3::after { width: 80px; height: 80px; top: -40px; left: 70px; }
    .sun {
      position: absolute;
      top: 15px;
      left: 20px;
      font-size: 70px;
      z-index: 200;
      filter: drop-shadow(0 0 20px #ffd966);
      animation: sunTwinkle 4s infinite alternate ease-in-out;
      pointer-events: none;
    }
    @keyframes sunTwinkle {
      0% { filter: drop-shadow(0 0 15px #ffbb33); transform: scale(1) rotate(0deg); }
      100% { filter: drop-shadow(0 0 35px #ffee88); transform: scale(1.05) rotate(5deg); }
    }
    .control-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 20px 30px;
      margin-bottom: 30px;
      width: 90%;
      max-width: 800px;
      box-shadow: 0 15px 25px rgba(0, 50, 80, 0.2);
      border: 2px solid rgba(255,255,255,0.5);
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
      justify-content: center;
    }
    .library-badge {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.6);
      padding: 12px 25px;
      border-radius: 50px;
      font-size: 1.3rem;
      color: #05445e;
      font-weight: 600;
      backdrop-filter: blur(4px);
      border: 2px dashed #0284c7;
    }
    .library-badge span {
      background: #ffb703;
      color: #023047;
      padding: 5px 18px;
      border-radius: 40px;
      font-size: 1.1rem;
      letter-spacing: 1px;
    }
    .sky {
      position: relative;
      width: 100%;
      max-width: 1100px;
      height: 550px;
      background: transparent;
      overflow: visible;
      border-radius: 60px 60px 30px 30px;
      margin: 20px 0;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
      z-index: 5;
      border: 3px solid rgba(255,255,255,0.7);
    }
    .kite-container {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 20;
    }
    .kite {
      position: absolute;
      width: 90px;
      height: 110px;
      cursor: pointer;
      transition: filter 0.2s, left 0.3s ease-out, top 0.3s ease-out;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1));
      animation: float 8s infinite ease-in-out;
      transform-origin: center center;
      z-index: 25;
    }
    .kite.stopped {
      animation-play-state: paused;
    }
    .kite.centered {
      width: 90% !important;
      max-width: 600px !important;
      height: auto !important;
      max-height: 85% !important;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border: 6px solid rgba(255, 255, 255, 0.95);
      border-radius: 60px;
      box-shadow: 0 40px 60px rgba(0, 30, 50, 0.5);
      display: flex !important;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 15px 15px 20px 15px;
      animation: none !important;
      left: 50% !important;
      top: 50% !important;
      transform: translate(-50%, -50%) !important;
      transition: left 0.3s ease-out, top 0.3s ease-out;
      z-index: 200;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #0284c7 #e0f2fe;
    }
    .kite.centered::-webkit-scrollbar {
      width: 8px;
    }
    .kite.centered::-webkit-scrollbar-track {
      background: #e0f2fe;
      border-radius: 20px;
    }
    .kite.centered::-webkit-scrollbar-thumb {
      background: #0284c7;
      border-radius: 20px;
    }
    .kite.centered .animal-face {
      width: 140px;
      height: 140px;
      max-width: 90%;
      font-size: 100px;
      background: rgba(255, 240, 200, 0.9);
      border: 5px solid white;
      border-radius: 50% 50% 30% 30%;
      box-shadow: 0 15px 25px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 5px 0 10px 0;
      aspect-ratio: 1/1;
      line-height: 1;
      flex-shrink: 0;
    }
    .kite.centered .explanation-bubble {
      position: static !important;
      display: block !important;
      width: 100%;
      background: rgba(255, 250, 235, 0.9);
      border: 3px solid white;
      border-radius: 50px;
      padding: 15px 18px;
      font-size: 1.8rem;
      line-height: 1.5;
      text-align: center;
      color: #05445e;
      box-shadow: 0 10px 20px rgba(0, 30, 40, 0.2);
      margin-top: 5px;
      word-break: break-word;
      backdrop-filter: blur(4px);
      font-weight: 500;
      flex-shrink: 1;
      overflow-wrap: break-word;
    }
    .kite.centered .kite-line {
      display: none;
    }
    .animal-face {
      font-size: 4rem;
      line-height: 1;
      text-align: center;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(2px);
      width: 80px;
      height: 80px;
      border-radius: 50% 50% 30% 30%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      border: 3px solid white;
      box-shadow: 0 5px 0 #aec9e0;
      transform: rotate(2deg);
      position: relative;
      z-index: 30;
    }
    .kite-line {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 80px;
      background: white;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
      border-radius: 2px;
      z-index: 20;
      pointer-events: none;
      opacity: 0.9;
    }
    .explanation-bubble {
      display: none;
    }
    .button-group {
      display: flex;
      gap: 25px;
      align-items: center;
      justify-content: center;
      margin: 25px 0 10px;
      z-index: 30;
    }
    .action-btn {
      background: #ffe7b6;
      border: none;
      font-size: 3.5rem;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 10px 0 #cb9e5b, 0 10px 25px #0277a0;
      transition: 0.08s linear;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid white;
      color: #2b4f6e;
      background: #f9e7b3;
      transform: rotate(0deg);
    }
    .action-btn:active {
      transform: translateY(7px);
      box-shadow: 0 3px 0 #cb9e5b, 0 8px 20px #0277a0;
    }
    .action-btn:hover {
      background: #fff2cf;
    }
    .search-btn {
      font-size: 3rem;
    }
    @keyframes float {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(15px, -25px) rotate(6deg); }
      50% { transform: translate(-10px, -40px) rotate(-4deg); }
      75% { transform: translate(8px, -20px) rotate(3deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
    .toast-msg {
      background: #05445e;
      color: #f0f9ff;
      padding: 12px 30px;
      border-radius: 40px;
      font-weight: 500;
      margin-top: 15px;
      opacity: 0.9;
      font-size: 1.3rem;
      max-width: 700px;
      word-wrap: break-word;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: background 0.2s, color 0.2s;
    }
    .figure-badge {
      background: #f5e56b;
      color: #1e3c5c;
      padding: 5px 25px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 2rem;
      display: inline-block;
      margin-top: 8px;
      box-shadow: 0 4px 0 #b68b40;
    }
    footer {
      color: #0369a1;
      font-weight: 500;
      margin-top: 5px;
      text-shadow: 0 2px 3px white;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="sun">☀️</div>
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>
  <div class="control-panel">
    <div class="library-badge">
      📚 修辭題庫 · 合併大全（擬人／擬物／明喻／暗喻／反復／反語／呼告／反問／設問／疑問）
      <span>26 個句子</span>
    </div>
  </div>
  <div class="sky">
    <div class="kite-container" id="kiteContainer"></div>
  </div>
  <div class="button-group">
    <button class="action-btn search-btn" id="searchBtn" title="顯示目前句子的修辭手法">🔍</button>
    <button class="action-btn" id="resetBtn" title="讓所有風箏繼續飄動">🌀</button>
  </div>
  <div id="message" class="toast-msg">🎏 點擊風箏，抽出一個句子（共26題，不重複抽選）</div>
  <footer>🌤️ 每個風箏都拖著白色的線 · 題目不重複抽選</footer>

  <script>
    (function() {
      const kiteContainer = document.getElementById('kiteContainer');
      const resetBtn = document.getElementById('resetBtn');
      const searchBtn = document.getElementById('searchBtn');
      const messageDiv = document.getElementById('message');
      const animals = ['🐶', '🐱', '🐼', '🦊', '🐸', '🐨', '🐧', '🐰', '🦝', '🐥'];
      const KITE_COUNT = 8;

      const questionBank = [
        { figure: '擬人', sentence: '頑皮的小雨滴在荷葉上盡情地跳舞。' },
        { figure: '擬物', sentence: '在教官嚴厲的注視下，他嚇得夾著尾巴逃跑了。' },
        { figure: '明喻', sentence: '運動員們如同離弦的箭，飛快地衝向終點。' },
        { figure: '暗喻', sentence: '香港是一顆明珠，光輝璀璨。' },
        { figure: '連續反復', sentence: '快跑！快跑！後面的追兵就要趕上來了。' },
        { figure: '反語', sentence: '你的動作可真快啊，讓我們足足等了半個小時！' },
        { figure: '反語', sentence: '我那時真是聰明得過份，總覺他說話不大漂亮，非自己插嘴不可。' },
        { figure: '呼告', sentence: '哥哥，你在國外一定要好好地照顧自己啊！' },
        { figure: '呼告', sentence: '大自然啊，你的創造力是如此的驚人！' },
        { figure: '呼告', sentence: '江河啊，請你把我的憂愁带走吧！' },
        { figure: '反問', sentence: '難道你不知道在課室裏是需要保持安靜的嗎？' },
        { figure: '反問', sentence: '難道你不知道沉迷網上遊戲是不健康的嗎？' },
        { figure: '設問', sentence: '學跆拳道有什麼好處？可以強身健體。' },
        { figure: '疑問', sentence: '這道題的正確解法是什麼？' },
      ];

      const TOTAL_QUESTIONS = questionBank.length;
      let usedIndices = [];
      let currentCenteredKite = null;

      function getRandomUnusedQuestion() {
        if (usedIndices.length >= TOTAL_QUESTIONS) {
          usedIndices = [];
          showMessage('🔄 題庫已循環，重新開始抽題', false);
        }
        const availableIndices = [];
        for (let i = 0; i < TOTAL_QUESTIONS; i++) {
          if (!usedIndices.includes(i)) availableIndices.push(i);
        }
        const randomIdx = availableIndices[Math.floor(Math.random() * availableIndices.length)];
        usedIndices.push(randomIdx);
        return { ...questionBank[randomIdx], index: randomIdx };
      }

      function showMessage(text, isError = false) {
        messageDiv.innerHTML = text;
        messageDiv.style.background = isError ? '#9b1c1c' : '#05445e';
        messageDiv.style.color = '#f0f9ff';
      }

      function createKites() {
        kiteContainer.innerHTML = '';
        for (let i = 0; i < KITE_COUNT; i++) {
          const kite = document.createElement('div');
          kite.className = 'kite';
          const left = 5 + Math.random() * 80;
          const top = 5 + Math.random() * 70;
          kite.style.left = left + '%';
          kite.style.top = top + '%';
          kite.dataset.originalLeft = left;
          kite.dataset.originalTop = top;
          const duration = 6 + Math.floor(Math.random() * 8);
          kite.style.animationDuration = duration + 's';
          kite.style.animationDelay = (Math.random() * 3) + 's';
          const animalEmoji = animals[i % animals.length];
          kite.setAttribute('data-animal', animalEmoji);
          const faceDiv = document.createElement('div');
          faceDiv.className = 'animal-face';
          faceDiv.textContent = animalEmoji;
          const lineDiv = document.createElement('div');
          lineDiv.className = 'kite-line';
          const bubble = document.createElement('div');
          bubble.className = 'explanation-bubble';
          kite.appendChild(faceDiv);
          kite.appendChild(lineDiv);
          kite.appendChild(bubble);
          kiteContainer.appendChild(kite);
        }
      }

      function adjustFontSizeByLength(element, text) {
        if (!element) return;
        element.style.fontSize = '';
        const len = text.length;
        const minLen = 5;
        const maxLen = 80;
        const minFont = 1.1;
        const maxFont = 2.6;
        const clampedLen = Math.min(maxLen, Math.max(minLen, len));
        const fontSize = maxFont - ((clampedLen - minLen) / (maxLen - minLen)) * (maxFont - minFont);
        element.style.fontSize = fontSize + 'rem';
      }

      function restoreKitePosition(kite) {
        if (!kite) return;
        kite.classList.remove('centered', 'stopped');
        if (kite.dataset.originalLeft && kite.dataset.originalTop) {
          kite.style.left = kite.dataset.originalLeft + '%';
          kite.style.top = kite.dataset.originalTop + '%';
        }
        const bubble = kite.querySelector('.explanation-bubble');
        if (bubble) {
          bubble.style.display = 'none';
          bubble.innerHTML = '';
          bubble.style.fontSize = '';
        }
        delete kite.dataset.currentFigure;
        delete kite.dataset.currentSentence;
      }

      function centerKite(kite) {
        if (currentCenteredKite && currentCenteredKite !== kite) {
          restoreKitePosition(currentCenteredKite);
        }
        if (!kite.dataset.originalLeft) {
          const left = parseFloat(kite.style.left) || 50;
          const top = parseFloat(kite.style.top) || 50;
          kite.dataset.originalLeft = left;
          kite.dataset.originalTop = top;
        }
        kite.classList.add('centered', 'stopped');
        const bubble = kite.querySelector('.explanation-bubble');
        if (bubble) bubble.style.display = '';
        currentCenteredKite = kite;
        document.body.classList.add('focus-mode');
      }

      function resetAllKites() {
        const kites = document.querySelectorAll('.kite');
        kites.forEach(kite => restoreKitePosition(kite));
        currentCenteredKite = null;
        document.body.classList.remove('focus-mode');
        showMessage('✨ 風箏恢復飄動，可繼續點擊抽取新句子');
      }

      function showCurrentFigure() {
        if (!currentCenteredKite) {
          showMessage('❓ 沒有正在觀看的風箏，請先點擊一個風箏', true);
          return;
        }
        const figure = currentCenteredKite.dataset.currentFigure;
        const sentence = currentCenteredKite.dataset.currentSentence || '';
        if (!figure) {
          showMessage('⚠️ 這個風箏還沒有句子，請重新點擊', true);
          return;
        }
        messageDiv.innerHTML = `🔍 修辭手法：<span class="figure-badge">${figure}</span><br><span style="font-size:1rem;">「${sentence}」</span>`;
        messageDiv.style.background = '#1e5f7a';
        messageDiv.style.color = '#fef9e0';
      }

      function onKiteClick(e) {
        const kite = e.target.closest('.kite');
        if (!kite) return;
        const isSameKite = (currentCenteredKite === kite);
        if (!isSameKite) {
          if (currentCenteredKite) restoreKitePosition(currentCenteredKite);
          centerKite(kite);
        } else {
          if (!kite.classList.contains('centered')) centerKite(kite);
        }
        const bubble = kite.querySelector('.explanation-bubble');
        if (!bubble) return;
        const { figure, sentence } = getRandomUnusedQuestion();
        bubble.innerHTML = sentence;
        adjustFontSizeByLength(bubble, sentence);
        kite.dataset.currentFigure = figure;
        kite.dataset.currentSentence = sentence;
        showMessage(`✨ 句子已送達風箏。按🔍查看修辭`, false);
      }

      kiteContainer.addEventListener('click', onKiteClick);
      resetBtn.addEventListener('click', resetAllKites);
      searchBtn.addEventListener('click', showCurrentFigure);

      createKites();
      showMessage(`🎏 點擊風箏抽取句子（共 ${TOTAL_QUESTIONS} 種修辭，不重複）`);
    })();
  </script>
</body>
</html>
